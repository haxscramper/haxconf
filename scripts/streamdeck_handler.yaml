decks:
  - device_type: "Stream Deck Neo"
    pages:
      - name: "Page 2"
        buttons:
          0:
            title_text:
              text: "Step\nOver"
              font_size: 28
            action:
              type: "emulate_shortcut"
              shortcut: "f10"
          1:
            title_text:
              text: "Step\nInto"
              font_size: 28
            action:
              type: "emulate_shortcut"
              shortcut: "f11"
          2:
            title_text:
              text: "Step\nOut"
              font_size: 28
            action:
              type: "emulate_shortcut"
              shortcut: "f12"
          9:
            action:
              type: "change_page"
              direction: "forward"
          8:
            action:
              type: "change_page"
              direction: "backward"
      - name: "Page 3"
        buttons:
          0:
            action:
              type: "execute_script"
              script: "positional_emacs_focus.py left-upper left"
            image_path: "~/defaultdirs/images/streamdeck/split_left_upper_left.png"
          1:
            action:
              type: "execute_script"
              script: "positional_emacs_focus.py left-upper right"
            image_path: "~/defaultdirs/images/streamdeck/split_left_upper_right.png"
          4:
            action:
              type: "execute_script"
              script: "positional_emacs_focus.py left-lower left"
            image_path: "~/defaultdirs/images/streamdeck/split_left_lower_left.png"
          5:
            action:
              type: "execute_script"
              script: "positional_emacs_focus.py left-lower right"
            image_path: "~/defaultdirs/images/streamdeck/split_left_lower_right.png"
          6:
            action:
              type: "execute_script"
              script: "positional_emacs_focus.py right left"
            image_path: "~/defaultdirs/images/streamdeck/split_right_left.png"
          7:
            action:
              type: "execute_script"
              script: "positional_emacs_focus.py right right"
            image_path: "~/defaultdirs/images/streamdeck/split_right_right.png"

          9:
             action:
              type: "change_page"
              direction: "forward"
          8:
             action:
              type: "change_page"
              direction: "backward"
      - name: "Page 4"
        buttons:
          4:
            title_text:
              text: "WACOM"
              font_size: 28
            action:
              type: "execute_script"
              script: "fixwacom.py"
          9:
             action:
              type: "change_page"
              direction: "forward"
          8:
             action:
              type: "change_page"
              direction: "backward"
      - name: "Page 5"
        buttons:
          0:
            title_text:
              text: "-120"
              font_size: 36
            action:
              type: "execute_script"
              script: "playerctl_wrap.py rel-position -120"
          1:
            title_text:
              text: "+120"
              font_size: 36
            action:
              type: "execute_script"
              script: "playerctl_wrap.py rel-position +120"
          2:
            title_text:
              text: "-300"
              font_size: 36
            action:
              type: "execute_script"
              script: "playerctl_wrap.py rel-position -300"
          3:
            title_text:
              text: "+300"
              font_size: 36
            action:
              type: "execute_script"
              script: "playerctl_wrap.py rel-position +300"
          4:
            title_text:
              text: "=/>>"
              font_size: 36
            action:
              type: "execute_script"
              script: "playerctl play-pause"
          5:
            title_text:
              text: "<"
              font_size: 48
            action:
              type: "execute_script"
              script: "playerctl previous"
          6:
            title_text:
              text: ">"
              font_size: 48
            action:
              type: "execute_script"
              script: "playerctl next"
          9:
             action:
              type: "change_page"
              direction: "forward"
          8:
             action:
              type: "change_page"
              direction: "backward"

  - device_type: "Stream Deck Original"
    pages:
      - name: "Main"
        buttons:
          0:
            action:
              type: "focus_window"
              text: "Qt Creator"
            image_path: "~/defaultdirs/images/streamdeck/Qt_logo_neon_2022.svg.png"
          1:
            action:
              type: "focus_window"
              text: "emacs"
            image_path: "~/defaultdirs/images/streamdeck/emacs_logo.jpg"
          2:
            action:
