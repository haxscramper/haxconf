- role: user
  content: 'how to exclude hidden files from the directory listing in filezilla? I log into the server and it has dozens of dotfiles/dotdirs I''m not intresting in and it is very annoying. '
- role: assistant
  content: |-
    In FileZilla, go to **View** → **Filename filters** and add `.*` to the excluded patterns list. This will hide all files and directories starting with a dot (hidden files/folders).

    Alternatively, you can use **Ctrl+I** to quickly toggle the filename filters on/off once you've set them up.
